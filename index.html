<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
   <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- wrapper -->
    <div>
      <!-- heading -->
      <h1>Password Generator</h1>
      <!-- output box  -->
      <div class="display-container">
        <input
          readonly
          placeholder="Password"
          class="display"
          data-passwordDispaly
        />
        <button data-copy>
          <span data-copyMessage></span>
          <img src="./assets/copy.svg" alt="copy" width="23" height="23"  />
        </button>
      </div>
      <!-- main-content div -->
      <div class="input-container">
        <div class="password-length">
            <p>Password length</p>
            <p data-lengthNumber>0</p>
        </div>

        <!-- slider -->
         <input type="range" min="1" max="20" class="slider" step="1" data-length-slider>
         <!-- checkboxes -->

         <div>
            <input type="checkbox" name="" id="uppercase">
            <label for="uppercase">Includes Uppercase letters</label>
         </div>
         <div>
            <input type="checkbox" name="" id="lowercase">
            <label for="lowercase">Includes Lowercase letters</label>
         </div>
         <div>
            <input type="checkbox" name="" id="numbers">
            <label for="numbers">Includes Numbers</label>
         </div>
         <div>
            <input type="checkbox" name="" id="symbols">
            <label for="symbols">Includes Symbols</label>
         </div>

         <!-- strength section  -->

         <div class="strength-container">
            <p>Strength</p>
            <div data-indicator></div>
         </div>

         <!-- generate password button  -->
          <button class="generate-button">
            Generate Password
          </button>

      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
